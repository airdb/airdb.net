version: 2
updates:
  # npm ecosystem 同样负责 pnpm-lock.yaml
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    versioning-strategy: increase
    commit-message:
      prefix: "deps"
    open-pull-requests-limit: 5
    # minor/patch 合并成一个 PR，减少噪音；major 单独开
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # 同步维护 workflow 里 pin 到 commit SHA 的 action 版本
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "ci"
    open-pull-requests-limit: 5
